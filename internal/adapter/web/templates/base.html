{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Laptime Leaderboard{{end}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e1e4ed;
            --muted: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #5a52d5;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --valid: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }
        nav .container { display: flex; align-items: center; gap: 2rem; }
        nav a { color: var(--text); text-decoration: none; font-weight: 500; }
        nav a:hover { color: var(--accent); }
        .logo { font-size: 1.25rem; font-weight: 700; color: var(--accent); }

        main { padding: 2rem 0; }

        h1 { font-size: 1.75rem; margin-bottom: 1.5rem; }

        select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: var(--accent); }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
        .filter-group label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(108, 99, 255, 0.05); }

        .rank { font-weight: 700; width: 3rem; text-align: center; }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .lap-time { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 600; font-size: 1rem; }
        .sectors { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; color: var(--muted); }
        .country { font-size: 0.85rem; color: var(--muted); }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .card p { color: var(--muted); font-size: 0.9rem; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .game-card { text-decoration: none; color: inherit; transition: border-color 0.2s; }
        .game-card:hover { border-color: var(--accent); }

        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            margin-top: 3rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">Laptime Leaderboard</a>
            <a href="/">Home</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>
    <main class="container">
        {{block "content" .}}{{end}}
    </main>
    <footer>
        <div class="container">Laptime Leaderboard</div>
    </footer>
</body>
</html>
{{end}}

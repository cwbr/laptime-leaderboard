{{define "index.html"}}
{{template "base" .}}
{{end}}

{{define "title"}}Laptime Leaderboard{{end}}

{{define "content"}}
<h1>Games</h1>
{{if .Games}}
<div class="game-grid">
    {{range .Games}}
    <a href="/leaderboard?game_id={{.ID}}" class="card game-card">
        <h2>{{.Name}}</h2>
        <p>View leaderboards →</p>
    </a>
    {{end}}
</div>
{{else}}
<div class="empty-state">
    <p>No games registered yet. Connect a server plugin to get started.</p>
</div>
{{end}}
{{end}}

{{define "leaderboard.html"}}
{{template "base" .}}
{{end}}

{{define "title"}}Leaderboard — Laptime Leaderboard{{end}}

{{define "content"}}
<div class="filters">
    <div class="filter-group">
        <label>Game</label>
        <select name="game_id"
                onchange="window.location='/?game_id='+this.value">
            {{range .Games}}
            <option value="{{.ID}}" {{if eq .ID $.SelectedGame}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>
    <div class="filter-group">
        <label>Track</label>
        <select name="track_id"
                hx-get="/leaderboard"
                hx-target="#leaderboard-area"
                hx-include=".filters select"
                hx-push-url="true">
            {{range .Tracks}}
            <option value="{{.ID}}" {{if eq .ID $.SelectedTrack}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>
    <div class="filter-group">
        <label>Car</label>
        <select name="car_id"
                hx-get="/leaderboard"
                hx-target="#leaderboard-area"
                hx-include=".filters select"
                hx-push-url="true">
            <option value="">All cars</option>
            {{range .Cars}}
            <option value="{{.ID}}" {{if eq .ID $.SelectedCar}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>
    <div class="filter-group">
        <label>Server</label>
        <select name="server_id"
                hx-get="/leaderboard"
                hx-target="#leaderboard-area"
                hx-include=".filters select"
                hx-push-url="true">
            <option value="">All servers</option>
            {{range .Servers}}
            <option value="{{.ID}}" {{if eq .ID $.SelectedServer}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>
</div>

<div id="leaderboard-area">
    {{template "leaderboard_table" .}}
</div>
{{end}}
